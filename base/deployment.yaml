---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant
    spec:
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant
          envFrom:
            - configMapRef:
                name: home-assistant-config
          ports:
            - name: ui
              containerPort: 8123
          volumeMounts:
            - name: home-assistant-data
              mountPath: /config
          resources:
            requests:
              cpu: '2'
              memory: 1Gi
            limits:
              memory: 2Gi
        - name: matter-server
          image: ghcr.io/home-assistant-libs/python-matter-server:stable
          ports:
            - containerPort: 5580
          volumeMounts:
            - name: matter-data
              mountPath: /data
      volumes:
        - name: home-assistant-data
          persistentVolumeClaim:
            claimName: home-assistant-pvc
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-server-data
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
